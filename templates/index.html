<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grid Capture</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div id="app">

    <header id="hud">
      <div id="logo">⬛ GRID CAPTURE</div>
      <div id="my-badge">
        <span id="my-dot"></span>
        <span id="my-name"></span>
      </div>
      <div id="hud-right">
        <div class="stat"><span class="stat-val" id="my-count">0</span><span class="stat-lbl">your tiles</span></div>
        <div class="stat"><span class="stat-val" id="online-count">1</span><span class="stat-lbl">online</span></div>
        <div id="cooldown-wrap"><div id="cooldown-bar"></div></div>
      </div>
    </header>

    <div id="main">

      <div id="canvas-wrap">
        <div id="grid"></div>
      </div>

      <aside id="sidebar">
        <div class="side-section">
          <div class="side-title">🏆 Leaderboard</div>
          <div id="leaderboard"></div>
        </div>
        <div class="side-section">
          <div class="side-title">📡 Live Feed</div>
          <div id="feed"></div>
        </div>
      </aside>

    </div>

  </div>

  <div id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
